name: PR Checks

on:
    pull_request:
        branches: [main]

jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Prettier
              run: npm run format:check

            - name: ESLint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Tests
              run: npm test
