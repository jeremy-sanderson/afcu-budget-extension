name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Detect version change
              id: version
              run: |
                  current=$(node -p "require('./package.json').version")
                  previous=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
                  echo "current=$current" >> "$GITHUB_OUTPUT"
                  echo "previous=$previous" >> "$GITHUB_OUTPUT"
                  if [ "$current" != "$previous" ] && [ -n "$current" ]; then
                      echo "changed=true" >> "$GITHUB_OUTPUT"
                      echo "Version changed: $previous -> $current"
                  else
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                      echo "Version unchanged ($current); skipping release."
                  fi

            - uses: actions/setup-node@v4
              if: steps.version.outputs.changed == 'true'
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Install dependencies
              if: steps.version.outputs.changed == 'true'
              run: npm ci

            - name: Build extension
              if: steps.version.outputs.changed == 'true'
              run: npm run build

            - name: Package extension
              if: steps.version.outputs.changed == 'true'
              id: package
              run: |
                  version="${{ steps.version.outputs.current }}"
                  artifact="afcu-budget-v${version}.zip"
                  (cd .output/chrome-mv3 && zip -r "../../${artifact}" .)
                  echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              if: steps.version.outputs.changed == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.current }}
                  name: v${{ steps.version.outputs.current }}
                  generate_release_notes: true
                  files: ${{ steps.package.outputs.artifact }}
                  body: |
                      ## Installation

                      Chrome only allows installing `.zip` / `.crx` extensions from the Chrome Web Store, so this build has to be loaded as an unpacked extension:

                      1. Download `afcu-budget-v${{ steps.version.outputs.current }}.zip` from the **Assets** below.
                      2. Unzip it to a folder you'll keep around (e.g. `~/chrome-extensions/afcu-budget/`). Chrome loads the extension *from* that folder — don't delete it.
                      3. Open `chrome://extensions` in Chrome.
                      4. Toggle **Developer mode** on (top-right).
                      5. Click **Load unpacked** and select the unzipped folder.

                      ### Updating from a previous release

                      Download the new zip, overwrite the contents of the existing folder, then click the reload icon on the extension's card in `chrome://extensions`.

                      > Chrome will display a "disable developer mode extensions" banner on startup while this extension is loaded. That's expected for unpacked extensions.

                      ### What's in this release

                      See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/v${{ steps.version.outputs.current }}/CHANGELOG.md) for a description of the changes in this version, and the full history of prior releases.

                      ---
